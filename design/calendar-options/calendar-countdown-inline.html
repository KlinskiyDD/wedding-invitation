<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Countdown Calendar Inline Preview</title>
    <style>
      :root {
        --paper: #fbf8f2;
        --ink: #2d2a25;
        --gold: #c39846;
        --gold-soft: #ddc390;
        --olive-dark: #4c5139;
        --white: #fffdf8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #f5f1eb;
        color: var(--ink);
        font-family: Georgia, "Times New Roman", serif;
      }

      .preview {
        width: 1040px;
        padding: 38px;
      }

      .countdown-frame {
        position: relative;
        overflow: hidden;
        max-width: 920px;
        margin: 0 auto;
        border: 1px solid rgba(221, 195, 144, 0.72);
        border-radius: 18px;
        background:
          radial-gradient(circle at 13% 100%, rgba(195, 152, 70, 0.18), transparent 31%),
          radial-gradient(circle at 93% 0%, rgba(255, 253, 248, 0.08), transparent 29%),
          linear-gradient(135deg, #3d442f 0%, #535d42 52%, #3f4632 100%);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.08),
          0 14px 36px rgba(62, 65, 48, 0.18);
        color: var(--white);
        padding: 30px 74px 26px;
        text-align: center;
      }

      .countdown-frame::after {
        position: absolute;
        right: 34px;
        bottom: 26px;
        width: 58px;
        height: 58px;
        background: url("../../public/images/generated/gold-dust-sprinkle.png") center / contain no-repeat;
        content: "";
        opacity: 0.2;
      }

      .title {
        margin: 0;
        color: var(--white);
        font-size: 22px;
        line-height: 1.2;
      }

      .countdown-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        max-width: 710px;
        margin: 17px auto 0;
        border-top: 1px solid rgba(195, 152, 70, 0.58);
        padding-top: 18px;
      }

      .countdown-item {
        border-left: 1px solid rgba(195, 152, 70, 0.56);
        padding: 0 26px;
      }

      .countdown-item:first-child {
        border-left: 0;
      }

      .countdown-item dt {
        font-size: 42px;
        line-height: 0.96;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.22);
      }

      .countdown-item dd {
        margin: 7px 0 0;
        font-size: 13px;
        text-transform: uppercase;
      }

      .calendar-row {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-top: 22px;
        border-top: 1px solid rgba(221, 195, 144, 0.42);
        padding-top: 16px;
      }

      .calendar-label {
        margin-right: 3px;
        color: rgba(255, 253, 248, 0.8);
        font-family: Arial, sans-serif;
        font-size: 11px;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      .calendar-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 104px;
        min-height: 32px;
        border: 1px solid rgba(221, 195, 144, 0.86);
        border-radius: 999px;
        background: rgba(255, 253, 248, 0.94);
        color: var(--olive-dark);
        font-family: Arial, sans-serif;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .calendar-button.primary {
        background: var(--gold-soft);
        color: #343624;
      }

      .mobile {
        width: 390px;
        margin: 34px auto 0;
      }

      .mobile .countdown-frame {
        border-radius: 8px;
        padding: 26px 20px 22px;
      }

      .mobile .title {
        font-size: 20px;
      }

      .mobile .countdown-grid {
        grid-template-columns: repeat(2, 1fr);
        row-gap: 18px;
      }

      .mobile .countdown-item:nth-child(odd) {
        border-left: 0;
      }

      .mobile .calendar-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: 100%;
        gap: 9px;
      }

      .mobile .calendar-label {
        grid-column: 1 / -1;
        margin: 0 0 2px;
      }

      .mobile .calendar-button {
        min-width: 0;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <main class="preview">
      <section class="countdown-frame" id="desktop-preview">
        <h1 class="title">До нашей свадьбы осталось</h1>
        <dl class="countdown-grid">
          <div class="countdown-item">
            <dt>50</dt>
            <dd>дней</dd>
          </div>
          <div class="countdown-item">
            <dt>22</dt>
            <dd>часов</dd>
          </div>
          <div class="countdown-item">
            <dt>51</dt>
            <dd>минут</dd>
          </div>
          <div class="countdown-item">
            <dt>26</dt>
            <dd>секунд</dd>
          </div>
        </dl>
        <div class="calendar-row">
          <span class="calendar-label">Добавить в календарь</span>
          <span class="calendar-button primary">Google</span>
          <span class="calendar-button">Apple</span>
        </div>
      </section>

      <section class="mobile" id="mobile-preview">
        <div class="countdown-frame">
          <h2 class="title">До нашей свадьбы осталось</h2>
          <dl class="countdown-grid">
            <div class="countdown-item">
              <dt>50</dt>
              <dd>дней</dd>
            </div>
            <div class="countdown-item">
              <dt>22</dt>
              <dd>часов</dd>
            </div>
            <div class="countdown-item">
              <dt>51</dt>
              <dd>минут</dd>
            </div>
            <div class="countdown-item">
              <dt>26</dt>
              <dd>секунд</dd>
            </div>
          </dl>
          <div class="calendar-row">
            <span class="calendar-label">Добавить в календарь</span>
            <span class="calendar-button primary">Google</span>
            <span class="calendar-button">Apple</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
